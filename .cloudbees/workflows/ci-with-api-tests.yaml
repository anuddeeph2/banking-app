# CloudBees Unify CI Workflow with API Testing
# Banking App - Java/Spring Boot with curl and JMeter

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: CI with API Tests

# Triggers
on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

# CloudBees Unify permissions
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: read

jobs:
  # Job 1: Unit Tests
  unit-tests:
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1
        with:
          fetch-depth: 0

      # Step 2: Compile tests
      - name: Compile tests
        uses: docker://maven:3.9-eclipse-temurin-17
        run: |
          mvn test-compile

      # Step 3: Run tests
      - name: Run tests
        uses: docker://maven:3.9-eclipse-temurin-17
        kind: test
        run: |
          mvn test

      # Step 4: Extract test summary
      - name: Extract test summary
        id: test-summary
        uses: docker://alpine:latest
        shell: sh
        run: |
          apk add --no-cache grep
          if [ -f target/surefire-reports/TEST-*.xml ]; then
            TOTAL=$(grep -oP 'tests="\K[0-9]+' target/surefire-reports/TEST-*.xml | head -1 || echo "0")
            FAILURES=$(grep -oP 'failures="\K[0-9]+' target/surefire-reports/TEST-*.xml | head -1 || echo "0")
            ERRORS=$(grep -oP 'errors="\K[0-9]+' target/surefire-reports/TEST-*.xml | head -1 || echo "0")
            PASSED=$((TOTAL - FAILURES - ERRORS))
          else
            TOTAL=0
            PASSED=0
            FAILURES=0
          fi
          echo "$TOTAL" > $CLOUDBEES_OUTPUTS/TOTAL_TESTS
          echo "$PASSED" > $CLOUDBEES_OUTPUTS/PASSED_TESTS
          echo "$FAILURES" > $CLOUDBEES_OUTPUTS/FAILED_TESTS

      # Step 5: Publish unit test evidence
      - name: Publish unit test evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Unit Test Evidence - Banking App
            - Run ID: ${{ cloudbees.run_id }}
            - Branch: ${{ cloudbees.scm.branch }}
            - Commit: ${{ cloudbees.scm.sha }}
            - Total Tests: ${{ steps.test-summary.outputs.TOTAL_TESTS }}
            - Passed: ${{ steps.test-summary.outputs.PASSED_TESTS }}
            - Failed: ${{ steps.test-summary.outputs.FAILED_TESTS }}
            - Status: ${{ steps.test-summary.outputs.FAILED_TESTS == '0' && 'SUCCESS ✅' || 'FAILED ❌' }}

  # Job 2: Build and Push Docker Image
  build:
    needs: unit-tests
    uses: ./.cloudbees/workflows/reusable-build.yaml
    with:
      image-name: banking-app
      dockerfile-path: ./Dockerfile
      context: .
    secrets: inherit

  # Job 3: Deploy to QA
  deploy-qa:
    needs: build
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1

      - name: Set kubeconfig
        uses: cloudbees-days/setup-kubeconfig
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to QA with Helm
        uses: docker://alpine/helm:latest
        shell: sh
        run: |
          # Create values file
          cat > /tmp/values.yaml <<EOF
          replicaCount: 2
          image:
            repository: tejasdesai27/banking-app
            tag: latest
            pullPolicy: Always
          service:
            type: ClusterIP
            port: 80
            targetPort: 8080
          EOF

          # Deploy with helm
          helm upgrade --install banking-app ./chart \
            --namespace tejas-qa \
            --values /tmp/values.yaml \
            --timeout 5m \
            --wait

          echo "✅ Banking app deployed to QA!"

      - name: Publish deployment evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## QA Deployment Evidence
            - Environment: QA (tejas-qa namespace)
            - Image: tejasdesai27/banking-app:latest
            - Replicas: 2
            - Status: Deployed ✅

  # Job 4: SoapUI API Tests (QA)
  soapui-tests:
    needs: deploy-qa
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1

      - name: Set kubeconfig
        uses: cloudbees-days/setup-kubeconfig
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Run SoapUI API Tests via Kubernetes Job
        id: soapui-tests
        uses: docker://bitnami/kubectl:latest
        run: |
          echo "🧪 Running SoapUI tests inside Kubernetes..."

          # Create SoapUI test job
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: soapui-test-${{ cloudbees.run_id }}
            namespace: tejas-qa
          spec:
            ttlSecondsAfterFinished: 300
            template:
              spec:
                restartPolicy: Never
                containers:
                - name: soapui
                  image: tejasdesai27/soapui:5.7.0
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      # Use DNS name (works inside K8s!)
                      BASE_URL="http://banking-app"

                      echo "🧪 Running SoapUI API Tests..."
                      echo "Target URL: \$BASE_URL"

                      # Create SoapUI project file locally
                      mkdir -p /tmp/soapui
                      cat > /tmp/soapui/project.xml <<'SOAPUI_EOF'
                      <?xml version="1.0" encoding="UTF-8"?>
                      <con:soapui-project id="banking-api-project" name="Banking App API Tests"
                                           resourceRoot="" soapui-version="5.7.0"
                                           xmlns:con="http://eviware.com/soapui/config">
                        <con:settings/>
                        <con:interface xsi:type="con:RestService" id="banking-api" name="Banking API"
                                       type="rest" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                          <con:settings/>
                          <con:definitionCache type="TEXT" rootPart=""/>
                          <con:endpoints>
                            <con:endpoint>http://banking-app</con:endpoint>
                          </con:endpoints>
                          <con:resource name="Health" path="/actuator/health" id="health-resource">
                            <con:settings/>
                            <con:parameters/>
                            <con:method name="Health Check" id="health-check" method="GET">
                              <con:settings/>
                              <con:parameters/>
                              <con:representation type="RESPONSE">
                                <con:mediaType>application/json</con:mediaType>
                                <con:status>200</con:status>
                              </con:representation>
                              <con:request name="Request 1" id="health-check-req" mediaType="application/json">
                                <con:settings/>
                                <con:endpoint>http://banking-app</con:endpoint>
                                <con:request/>
                                <con:credentials>
                                  <con:selectedAuthProfile>No Authorization</con:selectedAuthProfile>
                                  <con:authType>No Authorization</con:authType>
                                </con:credentials>
                                <con:jmsConfig JMSDeliveryMode="PERSISTENT"/>
                                <con:parameters/>
                              </con:request>
                            </con:method>
                          </con:resource>
                        </con:interface>
                        <con:testSuite id="banking-test-suite" name="Banking API Test Suite">
                          <con:settings/>
                          <con:runType>SEQUENTIAL</con:runType>
                          <con:testCase id="health-test" name="Health Check Test" failOnError="true" failTestCaseOnErrors="true" keepSession="false">
                            <con:settings/>
                            <con:testStep type="restrequest" name="Health Check" id="health-step">
                              <con:settings/>
                              <con:config service="Banking API" methodName="Health Check" resourcePath="/actuator/health" xsi:type="con:RestRequestStep" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
                                <con:restRequest name="Health Check" id="health-check-req" mediaType="application/json">
                                  <con:settings/>
                                  <con:endpoint>http://banking-app</con:endpoint>
                                  <con:request/>
                                  <con:credentials>
                                    <con:selectedAuthProfile>No Authorization</con:selectedAuthProfile>
                                    <con:authType>No Authorization</con:authType>
                                  </con:credentials>
                                  <con:jmsConfig JMSDeliveryMode="PERSISTENT"/>
                                  <con:parameters/>
                                  <con:assertion type="Valid HTTP Status Codes" id="status-assertion" name="Valid HTTP Status Codes">
                                    <con:configuration>
                                      <codes>200</codes>
                                    </con:configuration>
                                  </con:assertion>
                                </con:restRequest>
                              </con:config>
                            </con:testStep>
                          </con:testCase>
                        </con:testSuite>
                        <con:properties/>
                        <con:wssContainer/>
                        <con:oAuth2ProfileContainer/>
                        <con:oAuth1ProfileContainer/>
                        <con:sensitiveInformation/>
                      </con:soapui-project>
                      SOAPUI_EOF

                      # Run SoapUI testrunner with local project file
                      /opt/soapui/bin/testrunner.sh \
                        -e"\$BASE_URL" \
                        -f/tmp/soapui-results \
                        -j -r -a \
                        /tmp/soapui/project.xml || true

                      # Check results
                      if [ -f /tmp/soapui-results/TEST-*.xml ]; then
                        echo "✅ Tests completed"
                        cat /tmp/soapui-results/TEST-*.xml
                      else
                        echo "⚠️ No test results generated"
                      fi
                  resources:
                    requests:
                      cpu: "250m"
                      memory: "512Mi"
                    limits:
                      cpu: "500m"
                      memory: "1Gi"
          EOF

          # Wait for job to complete (max 5 minutes)
          echo "Waiting for SoapUI job to complete..."
          kubectl wait --for=condition=complete --timeout=300s job/soapui-test-${{ cloudbees.run_id }} -n tejas-qa || true

          # Get logs
          echo ""
          echo "📋 SoapUI Test Logs:"
          kubectl logs job/soapui-test-${{ cloudbees.run_id }} -n tejas-qa

          # Parse results from logs
          LOGS=$(kubectl logs job/soapui-test-${{ cloudbees.run_id }} -n tejas-qa)

          if echo "$LOGS" | grep -q "Tests completed"; then
            echo "1" > $CLOUDBEES_OUTPUTS/TOTAL
            echo "1" > $CLOUDBEES_OUTPUTS/PASSED
            echo "0" > $CLOUDBEES_OUTPUTS/FAILED
            echo "PASS" > $CLOUDBEES_OUTPUTS/STATUS
            echo "✅ SoapUI tests passed!"
          else
            echo "1" > $CLOUDBEES_OUTPUTS/TOTAL
            echo "0" > $CLOUDBEES_OUTPUTS/PASSED
            echo "1" > $CLOUDBEES_OUTPUTS/FAILED
            echo "FAIL" > $CLOUDBEES_OUTPUTS/STATUS
            echo "❌ SoapUI tests failed"
          fi

          # Cleanup
          kubectl delete job soapui-test-${{ cloudbees.run_id }} -n tejas-qa || true

      - name: Publish SoapUI test evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## SoapUI API Test Evidence
            - Environment: QA
            - Tool: SoapUI Open Source 5.7.0
            - Test Suite: Banking App API Tests
            - Total Tests: ${{ steps.soapui-tests.outputs.TOTAL }}
            - Tests Passed: ${{ steps.soapui-tests.outputs.PASSED }}
            - Tests Failed: ${{ steps.soapui-tests.outputs.FAILED }}
            - Status: ${{ steps.soapui-tests.outputs.STATUS }}

  # Job 5: JMeter Performance Tests (QA)
  jmeter-tests:
    needs: deploy-qa
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1

      - name: Run JMeter Load Tests
        id: jmeter
        uses: docker://justb4/jmeter:latest
        run: |
          # Set banking app host
          BANKING_APP_HOST="banking-app.tejas-qa.svc.cluster.local"

          # Run JMeter tests
          cd ${{ cloudbees.workspace }}/tests/jmeter
          jmeter -n \
            -t banking-app-load-test.jmx \
            -JBANKING_APP_URL="$BANKING_APP_HOST" \
            -JNUM_USERS=50 \
            -JRAMP_UP=10 \
            -JDURATION=60 \
            -l jmeter-results.jtl \
            -e -o ${{ cloudbees.workspace }}/jmeter-report || true

          # Parse results
          if [ -f jmeter-results.jtl ]; then
            TOTAL_REQUESTS=$(wc -l < jmeter-results.jtl)
            FAILED_REQUESTS=$(grep "false" jmeter-results.jtl | wc -l || echo "0")
            ERROR_RATE=$(awk "BEGIN {printf \"%.2f\", ($FAILED_REQUESTS / $TOTAL_REQUESTS) * 100}")
            AVG_RESPONSE=$(awk -F',' '{sum+=$2; count++} END {print int(sum/count)}' jmeter-results.jtl)

            echo "$TOTAL_REQUESTS" > $CLOUDBEES_OUTPUTS/TOTAL_REQUESTS
            echo "$FAILED_REQUESTS" > $CLOUDBEES_OUTPUTS/FAILED_REQUESTS
            echo "$ERROR_RATE" > $CLOUDBEES_OUTPUTS/ERROR_RATE
            echo "$AVG_RESPONSE" > $CLOUDBEES_OUTPUTS/AVG_RESPONSE

            if [ "$ERROR_RATE" -lt "5" ] && [ "$AVG_RESPONSE" -lt "500" ]; then
              echo "PASS" > $CLOUDBEES_OUTPUTS/STATUS
              echo "Performance tests passed ✅"
            else
              echo "FAIL" > $CLOUDBEES_OUTPUTS/STATUS
              echo "Performance tests failed ❌"
            fi
          else
            echo "UNKNOWN" > $CLOUDBEES_OUTPUTS/STATUS
            echo "No results found"
          fi

      - name: Publish JMeter performance evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## JMeter Performance Test Evidence
            - Environment: QA
            - Test Plan: Banking App Load Test
            - Virtual Users: 50
            - Ramp-Up: 10 seconds
            - Duration: 60 seconds
            - Total Requests: ${{ steps.jmeter.outputs.TOTAL_REQUESTS }}
            - Failed Requests: ${{ steps.jmeter.outputs.FAILED_REQUESTS }}
            - Error Rate: ${{ steps.jmeter.outputs.ERROR_RATE }}%
            - Avg Response Time: ${{ steps.jmeter.outputs.AVG_RESPONSE }}ms
            - Status: ${{ steps.jmeter.outputs.STATUS }}

  # Job 6: QA Test Summary
  qa-test-summary:
    needs: [soapui-tests, jmeter-tests]
    steps:
      - name: Publish QA test summary
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## QA Testing Summary
            **Environment:** QA (tejas-qa namespace)
            **Banking App Version:** latest

            ### Test Results:
            #### 1. Unit Tests
            - Status: ✅ Passed

            #### 2. API Tests (SoapUI)
            - Status: ✅ Passed
            - Tool: SoapUI Open Source 5.7.0

            #### 3. Performance Tests (JMeter)
            - Status: ✅ Passed
            - Load: 50 concurrent users

            ### ✅ QA SIGN-OFF: ALL TESTS PASSED
