apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My automation

on:
  push:
    branches:
      - '**'

jobs:
  ci-job:
    steps:
      - name: Configure Git
        uses: docker://alpine/git:latest
        run: |
          git config --global --add safe.directory /cloudbees/workspace
      
      - name: Checkout Code
        uses: https://github.com/cloudbees-io/checkout@v1
  
      - name: Build and Test Java App
        uses: docker://maven:3.9-eclipse-temurin-17
        run: |
          echo "Building Java/Spring Boot Banking App..."
          
          # Compile the project
          mvn clean compile
          
          # Run tests
          mvn test
          
          # Package the application
          mvn package -DskipTests
          
          echo "✅ Build and tests completed successfully!"
