apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My automation

on:
  push:
    branches:
      - '**'

jobs:
  ci-job:
    steps:
      - name: Configure Git
        uses: docker://alpine/git:latest
        run: |
          git config --global --add safe.directory /cloudbees/workspace
      
      - name: Checkout Code
        uses: https://github.com/cloudbees-io/checkout@v1
  
      - name: Build and Test Go App
        uses: docker://golang:1.20
        run: |
          # 1. List files to see the actual structure (Debug)
          ls -R
          
          # 2. Find where go.mod is and move there
          MOD_DIR=$(find . -name "go.mod" -exec dirname {} \;)
          cd "$MOD_DIR"
          
          # 3. Build and Test
          go mod download
          go build -v ./...
          go test -v ./...